<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Classifier</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>Image Classifier</h1>
      <p class="subtitle">Sube una imagen y el modelo te dirá si es un avión, bicicleta, coche o perro.</p>
    </header>

    <!-- Upload area -->
    <section id="upload-section">
      <div id="drop-zone" role="button" tabindex="0" aria-label="Zona de carga de imagen">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        <p class="drop-text"><strong>Arrastra una imagen aquí</strong></p>
        <p class="drop-subtext">o haz clic para seleccionar un archivo</p>
        <p class="drop-formats">JPEG · PNG · WebP</p>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>
    </section>

    <!-- Preview + results -->
    <section id="result-section" hidden>

      <div class="result-layout">

        <!-- Image preview -->
        <div class="preview-box">
          <img id="preview-img" src="" alt="Imagen subida" />
        </div>

        <!-- Prediction bars -->
        <div class="predictions-box">
          <div id="loading-indicator" class="loading" hidden>
            <div class="spinner"></div>
            <p>Analizando imagen…</p>
          </div>

          <div id="predictions-container" hidden>
            <h2 id="top-label"></h2>
            <div id="bars"></div>
          </div>
        </div>

      </div>

      <button id="reset-btn" class="reset-btn">
        Probar otra imagen
      </button>

    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
